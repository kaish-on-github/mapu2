<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>台灣廟宇集章圖鑑</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="card.css" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="back-btn">← 地圖</a>
      <div class="header-icon" aria-hidden="true">⛩️</div>
      <div>
        <h1 class="site-title">台灣廟宇集章圖鑑</h1>
        <p class="site-sub">走訪廟宇，集齊印章</p>
      </div>
    </div>
  </header>

  <!-- 登入畫面 -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="login-icon">⛩️</div>
      <h2 class="login-title">台灣廟宇集章圖鑑</h2>
      <p class="login-desc">登入後，你的集章記錄將永久保存<br>並且只有你看得到</p>
      <button id="google-login-btn" class="google-btn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="20" />
        使用 Google 登入
      </button>
    </div>
  </div>

  <!-- 主應用（登入後才顯示） -->
  <main class="app" id="main-app" style="display:none">

    <!-- 使用者資訊列 -->
    <div class="user-bar">
      <img id="user-avatar" class="user-avatar" src="" alt="" />
      <span id="user-name" class="user-name"></span>
      <button id="logout-btn" class="logout-btn">登出</button>
    </div>

    <!-- 進度條 -->
    <section class="progress-section">
      <p class="progress-label">已集章 <strong id="prog-count">0</strong> / <span id="prog-total">0</span></p>
      <div class="progress-bar-wrap" role="progressbar" aria-valuemin="0" aria-valuemax="0" aria-valuenow="0" id="prog-bar-aria">
        <div class="progress-bar" id="prog-bar"></div>
      </div>
    </section>

    <!-- 分頁 -->
    <nav class="tabs">
      <button class="tab active" data-tab="gallery" onclick="switchTab('gallery')">圖鑑</button>
      <button class="tab" data-tab="gps" onclick="switchTab('gps')">GPS 打卡</button>
      <button class="tab" data-tab="collected" onclick="switchTab('collected')">已集章</button>
    </nav>

    <!-- 圖鑑頁 -->
    <section id="tab-gallery" class="section active">

      <!-- 分類篩選列 -->
      <div class="filter-row">
        <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">全部</button>
        <button class="filter-btn" data-filter="官社" onclick="setFilter('官社')">🏯 官社</button>
        <button class="filter-btn" data-filter="縣社" onclick="setFilter('縣社')">⛩ 縣社</button>
        <button class="filter-btn" data-filter="鄉社" onclick="setFilter('鄉社')">🏮 鄉社</button>
      </div>

      <div class="grid" id="gallery-grid"></div>
    </section>

    <!-- GPS 打卡頁 -->
    <section id="tab-gps" class="section">
      <div class="gps-panel">
        <div class="gps-status">
          <div class="status-dot" id="status-dot"></div>
          <span class="status-text" id="status-text">點擊下方按鈕取得位置</span>
        </div>
        <div class="coord-row">
          <div class="coord-box">
            <div class="coord-label">緯度</div>
            <div class="coord-val" id="lat-val">—</div>
          </div>
          <div class="coord-box">
            <div class="coord-label">經度</div>
            <div class="coord-val" id="lng-val">—</div>
          </div>
        </div>
        <button class="check-btn" id="check-btn" onclick="checkLocation()">
          📍 取得 GPS 位置並打卡
        </button>
        <div id="nearest-box" class="nearest" style="display:none">
          <div class="nearest-label">最近景點</div>
          <div class="nearest-name" id="nearest-name">—</div>
          <div class="nearest-dist" id="nearest-dist">—</div>
        </div>
        <div id="result-banner" class="result-banner" style="display:none"></div>
      </div>
    </section>

    <!-- 已集章頁 -->
    <section id="tab-collected" class="section">
      <div class="grid" id="collected-grid"></div>
      <div id="collected-empty" class="empty-hint" style="display:none">
        <span class="empty-icon">🗺️</span>
        <p>尚未集到任何章，趕快出發吧！</p>
      </div>
    </section>

  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="modal" onclick="closeModalOverlay(event)">
    <div class="modal">
      <div class="modal-img" id="modal-img"></div>
      <div class="modal-photo-label" id="modal-photo-label"></div>

      <!-- 過去/現在切換（已集章才顯示） -->
      <div class="modal-photo-tabs" id="modal-photo-tabs" style="display:none">
        <button class="photo-tab-btn active" data-mode="past" onclick="showModalPhoto('past')">過去</button>
        <button class="photo-tab-btn" data-mode="now" onclick="showModalPhoto('now')">現在</button>
      </div>

      <div class="modal-title" id="modal-title"></div>
      <div class="modal-new-name" id="modal-new-name"></div>
      <div class="modal-sub" id="modal-sub"></div>
      <div class="modal-period" id="modal-period"></div>
      <div class="modal-status" id="modal-status"></div>
      <div class="modal-desc" id="modal-desc"></div>
      <button class="modal-close" onclick="closeModal()">關閉</button>
    </div>
  </div>

  <script type="module" src="firebase.js"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
