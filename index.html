<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>廟宇模擬器</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700;900&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- 頂部裝飾紋路 -->
  <div class="top-border-pattern"></div>

  <header class="site-header">
    <div class="header-ornament">✦</div>
    <h1>臺灣廟宇模擬器</h1>
    <div class="header-subtitle-line">
      <span class="line-deco"></span>
      <span class="subtitle-text">穿越時光・尋訪神祇</span>
      <span class="line-deco"></span>
    </div>
    <p class="header-desc">以下36個神社，你曾經去過幾個？</p>
  </header>

  <div class="audio_wrapper">
    <div class="audio-label">🎵 廟宇主題音樂</div>
    <audio controls loop>
      <source src="templeMusic.mp3" type="audio/mpeg">
    </audio>
  </div>

  <div class="controls_wrapper">
    <div id="controls">
      <div class="controls-inner">        
        <div class="count-row">

          <button class="count-chip guan" id="showGuan">
            <span class="count-icon">🏯</span>
            <span id="guanCount">官社：0</span>
          </button>

          <button class="count-chip xian" id="showXian">
            <span class="count-icon">⛩</span>
            <span id="xianCount">縣社：0</span>
          </button>

          <button class="count-chip xiang" id="showXiang">
            <span class="count-icon">🏮</span>
            <span id="xiangCount">鄉社：0</span>
          </button>  

        </div>
      </div>
    </div>
  </div>

  <div class="button_wrapper">
    <button id="viewAll">
      <span class="btn-icon">⊕</span> 顯示全部神社
    </button>
  </div>

  <div class="map-frame">
    <div id="map"></div>
  </div>

  <!-- 底部裝飾 -->
  <div class="footer-pattern"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="script.js"></script>
</body>
</html>
